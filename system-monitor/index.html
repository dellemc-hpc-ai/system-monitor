<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 16px; color: #fff; }
  .controls { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 0.85rem; color: #aaa; }
  .controls select, .controls button {
    background: #1e2230; color: #e0e0e0; border: 1px solid #333;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  }
  .controls select:hover, .controls button:hover { border-color: #555; }
  .controls button.active { background: #2d6cdf; border-color: #2d6cdf; }
  .controls button:hover { background: #383f5a; }
  #machine-select { min-width: 280px; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 16px; }
  .chart-card { background: #1a1d27; border-radius: 12px; padding: 16px; border: 1px solid #252a3a; }
  .chart-card h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; font-weight: 500; }
  .chart-wrapper { position: relative; height: 220px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: #1a1d27; border: 1px solid #252a3a; border-radius: 10px;
    padding: 14px 18px; display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label { font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.6rem; font-weight: 700; }
  .stat-sub { font-size: 0.75rem; color: #555; }
  .cpu-val { color: #4fc3f7; }
  .mem-val { color: #ba68c8; }
  .gpu-val { color: #81c784; }
  .gpu-mem-val { color: #ffb74d; }
  .updated { font-size: 0.75rem; color: #555; margin-top: 8px; }
  .loading { opacity: 0.5; pointer-events: none; }
  .gpu-tag { font-size: 0.7rem; background: #2d6cdf; color: #fff; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
  @media (max-width: 600px) {
    .charts { grid-template-columns: 1fr; }
    .stat-value { font-size: 1.3rem; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<h1>🖥️ System Monitor</h1>

<div class="controls">
  <label>Machine:</label>
  <select id="machine-select">
    <option value="">— Loading machines —</option>
  </select>
  <label style="margin-left:12px">Range:</label>
  <button id="btn-hour" class="active" onclick="setRange('hour')">Hour</button>
  <button id="btn-day" onclick="setRange('day')">Day</button>
  <button id="btn-week" onclick="setRange('week')">Week</button>
  <button onclick="refresh()" style="margin-left:auto">🔄 Refresh</button>
</div>

<div class="stats" id="stats">
  <div class="stat-card">
    <span class="stat-label">CPU Usage</span>
    <span class="stat-value cpu-val" id="s-cpu">--%</span>
    <span class="stat-sub" id="s-cpu-sub">--</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">System Memory</span>
    <span class="stat-value mem-val" id="s-mem">--%</span>
    <span class="stat-sub" id="s-mem-sub">--</span>
  </div>
  <div class="stat-card" id="gpu-stat-card">
    <span class="stat-label">GPU Utilization</span>
    <span class="stat-value gpu-val" id="s-gpu">--%</span>
    <span class="stat-sub" id="s-gpu-sub">--</span>
  </div>
  <div class="stat-card" id="gpu-mem-stat-card">
    <span class="stat-label">GPU Memory</span>
    <span class="stat-value gpu-mem-val" id="s-gpu-mem">--%</span>
    <span class="stat-sub" id="s-gpu-mem-sub">--</span>
  </div>
</div>

<div class="charts">
  <div class="chart-card">
    <h3>CPU Usage (%)</h3>
    <div class="chart-wrapper"><canvas id="chart-cpu"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>System Memory (%)</h3>
    <div class="chart-wrapper"><canvas id="chart-mem"></canvas></div>
  </div>
  <div class="chart-card" id="gpu-chart-card">
    <h3>GPU Utilization (%)</h3>
    <div class="chart-wrapper"><canvas id="chart-gpu"></canvas></div>
  </div>
  <div class="chart-card" id="gpu-mem-chart-card">
    <h3>GPU Memory (%)</h3>
    <div class="chart-wrapper"><canvas id="chart-gpu-mem"></canvas></div>
  </div>
</div>
<p class="updated" id="updated"></p>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const RANGES = { hour: 3600, day: 86400, week: 604800 };

// Colors for up to 8 GPUs (index 0–7). Single-homedashboard uses GPU[0] color.
const GPU_COLORS = [
  '81c784', // GPU0 — green (original)
  '4fc3f7', // GPU1 — light blue
  'ba68c8', // GPU2 — purple
  'ffb74d', // GPU3 — orange (original gpu-mem)
  'ef9a9a', // GPU4 — red
  'ffee58', // GPU5 — yellow
  '80cbc4', // GPU6 — teal
  'ce93d8', // GPU7 — lavender
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentRange = 'hour';
let charts       = {};
let machines     = [];
let currentMachine = null;

// ─── Init ────────────────────────────────────────────────────────────────────
function initCharts() {
  initOne('cpu', 'cpu', '4fc3f7');
  initOne('mem', 'mem', 'ba68c8');
  // GPU and GPU-mem charts are re-initialized per-machine (dynamic datasets)
  charts.gpu    = buildGpuChart('chart-gpu',    GPU_COLORS, 'utilization', '%');
  charts['gpu-mem'] = buildGpuChart('chart-gpu-mem', GPU_COLORS, 'memory_used_mb', 'MB');
}

function initOne(key, dataKey, color) {
  const ctx = document.getElementById('chart-' + key).getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 220);
  grad.addColorStop(0, '#' + color + '55');
  grad.addColorStop(1, '#' + color + '00');
  charts[key] = new Chart(ctx, {
    type: 'line',
    data: { datasets: [{ label: dataKey, data: [], borderColor: '#' + color, backgroundColor: grad, fill: true, borderWidth: 2 }] },
    options: chartOptions()
  });
}

function buildGpuChart(canvasId, colors, valueKey, unit) {
  // Build one dataset per GPU slot (up to 8)
  const datasets = Array.from({ length: 8 }, (_, i) => {
    const color = colors[i % colors.length];
    const grad = document.getElementById(canvasId).getContext('2d').createLinearGradient(0, 0, 0, 220);
    grad.addColorStop(0, '#' + color + '55');
    grad.addColorStop(1, '#' + color + '00');
    return { label: 'GPU' + i, data: [], borderColor: '#' + color, backgroundColor: grad, fill: true, borderWidth: 1.5, hidden: i > 0 };
  });
  const chart = new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { datasets },
    options: chartOptions()
  });
  chart._valueKey   = valueKey;
  chart._unit       = unit;
  chart._gpuCount   = 0;
  return chart;
}

function chartOptions() {
  return {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 300 },
    scales: {
      x: { type: 'time', time: { displayFormats: { hour: 'HH:mm', day: 'MM dd' } },
        grid: { color: '#252a3a' }, ticks: { color: '#666', maxTicksLimit: 8 } },
      y: { min: 0, max: 100, grid: { color: '#252a3a' }, ticks: { color: '#666' } }
    },
    plugins: { legend: { display: true, labels: { color: '#888', boxWidth: 12, font: { size: 11 } } } },
    elements: { point: { radius: 0, hoverRadius: 4 }, line: { tension: 0.3 } }
  };
}

// ─── Controls ────────────────────────────────────────────────────────────────
function setRange(r) {
  currentRange = r;
  ['btn-hour','btn-day','btn-week'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('btn-' + r).classList.add('active');
  refresh();
}

function setMachine(hostname) {
  currentMachine = machines.find(m => m.hostname === hostname) || null;
  refresh();
}

// ─── Load machines ────────────────────────────────────────────────────────────
async function loadMachines() {
  try {
    const r = await fetch('machines.json?t=' + Date.now());
    if (!r.ok) throw new Error('Failed to load machines');
    machines = await r.json();
    const sel = document.getElementById('machine-select');
    sel.innerHTML = '';
    if (machines.length === 0) {
      sel.innerHTML = '<option value="">— No machines found —</option>';
      return;
    }
    machines.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.hostname;
      const gpuDesc = m.gpu_count > 0
        ? ` (${m.gpu_types ? m.gpu_types[0] : 'GPU'} x${m.gpu_count})`
        : ' (no GPU)';
      opt.textContent = m.hostname + gpuDesc;
      sel.appendChild(opt);
    });
    sel.value = machines[0].hostname;
    currentMachine = machines[0];
  } catch (e) {
    console.error('Failed to load machines:', e);
    document.getElementById('machine-select').innerHTML = '<option value="">— Error loading machines —</option>';
  }
}

// ─── Refresh ─────────────────────────────────────────────────────────────────
async function refresh() {
  if (!currentMachine) return;
  const hostname  = currentMachine.hostname;
  const gpuCount  = currentMachine.gpu_count || 0;
  const hasGpu    = gpuCount > 0;

  // Show / hide GPU elements
  const gpuOpacity = hasGpu ? '1' : '0.4';
  document.getElementById('gpu-stat-card').style.opacity    = gpuOpacity;
  document.getElementById('gpu-mem-stat-card').style.opacity = gpuOpacity;

  // ── Determine which data files to load (local date, yesterday for day/week)
  const now       = Date.now();
  const cutoff    = now - (RANGES[currentRange] * 1000);
  const d         = new Date();
  const yd        = new Date(d.getTime() - 86400000);
  const today     = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  const yesterday = yd.getFullYear() + String(yd.getMonth()+1).padStart(2,'0') + String(yd.getDate()).padStart(2,'0');
  const files     = ['data/metrics_' + hostname + '_' + today + '.json'];
  if (currentRange === 'day' || currentRange === 'week')
    files.push('data/metrics_' + hostname + '_' + yesterday + '.json');

  // ── Fetch & parse
  let allData = [];
  for (const f of files) {
    try {
      const r = await fetch(f + '?t=' + now);
      if (!r.ok) { console.warn('Failed to fetch', f, r.status); continue; }
      const text  = await r.text();
      const lines = text.trim().split('\n');
      lines.forEach(line => { try { allData.push(JSON.parse(line)); } catch { } });
    } catch (e) { console.warn('Fetch error:', f, e); }
  }

  // ── Time-filter
  allData = allData.filter(d => new Date(d.timestamp).getTime() > cutoff);
  allData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

  if (allData.length === 0) {
    document.getElementById('updated').textContent =
      'No data for this range on [' + hostname + ']. Collector may not be running.';
    return;
  }

  // ── Top-level stat cards (CPU + system memory are always single values)
  const latest        = allData[allData.length - 1];
  const cpuMean       = mean(allData.map(d => d.cpu_percent));
  const memMean       = mean(allData.map(d => d.memory_percent));
  const memUsedGB     = (latest.memory_used_mb / 1024).toFixed(1);
  const memTotalGB    = (latest.memory_total_mb / 1024).toFixed(1);

  document.getElementById('s-cpu').textContent = cpuMean.toFixed(1) + '%';
  document.getElementById('s-cpu-sub').textContent = 'latest: ' + latest.cpu_percent.toFixed(1) + '%';
  document.getElementById('s-mem').textContent = memMean.toFixed(1) + '%';
  document.getElementById('s-mem-sub').textContent = memUsedGB + ' / ' + memTotalGB + ' GB';

  // ── GPU stat cards (aggregate across all GPUs)
  if (hasGpu) {
    const latestGpus = _normalizeGpus(latest.gpu);
    const validGpus  = latestGpus.filter(g => !g.error);
    const gpuUtilMean = validGpus.length ? mean(validGpus.map(g => g.utilization)) : 0;
    const gpuUtilPct  = gpuUtilMean.toFixed(1);
    const gpuUtilSub  = validGpus.map(g => 'GPU' + g.id + '=' + g.utilization.toFixed(0) + '%').join('  ');

    const totalMemUsed = validGpus.reduce((s, g) => s + g.memory_used_mb, 0);
    const totalMemTotal= validGpus.reduce((s, g) => s + g.memory_total_mb, 0);
    const gpuMemPct    = totalMemTotal > 0 ? (totalMemUsed / totalMemTotal * 100).toFixed(1) : '0.0';
    const gpuMemSub    = validGpus.map(g => 'GPU' + g.id + '=' + (g.memory_used_mb/1024).toFixed(1) + 'GB').join('  ');

    document.getElementById('s-gpu').textContent     = gpuUtilPct + '%';
    document.getElementById('s-gpu-sub').textContent = gpuUtilSub;
    document.getElementById('s-gpu-mem').textContent = gpuMemPct + '%';
    document.getElementById('s-gpu-mem-sub').textContent = gpuMemSub;
  } else {
    ['s-gpu','s-gpu-mem'].forEach(id => document.getElementById(id).textContent = 'N/A');
    ['s-gpu-sub','s-gpu-mem-sub'].forEach(id => document.getElementById(id).textContent = 'No GPU');
  }

  // ── Update CPU + Memory charts (single dataset)
  charts.cpu.data.datasets[0].data = allData.map(d => ({ x: new Date(d.timestamp), y: d.cpu_percent }));
  charts.mem.data.datasets[0].data  = allData.map(d => ({ x: new Date(d.timestamp), y: d.memory_percent }));
  charts.cpu.update();
  charts.mem.update();

  // ── Update GPU charts (one dataset per GPU)
  if (hasGpu) updateGpuChart(charts.gpu,      allData, 'utilization',    '%',  gpuCount);
  if (hasGpu) updateGpuChart(charts['gpu-mem'], allData, 'memory_used_mb', 'MB', gpuCount);

  document.getElementById('updated').textContent =
    'Updated: ' + new Date().toLocaleTimeString() +
    ' | ' + allData.length + ' pts | ' + hostname;
}

function _normalizeGpus(gpu) {
  // Support both legacy {utilization, memory_used_mb} object and
  // new-format [{id, utilization, memory_used_mb, ...}, ...]
  if (!gpu) return [];
  if (Array.isArray(gpu)) return gpu;
  return [gpu];   // legacy single-GPU object
}

function updateGpuChart(chart, allData, valueKey, unit, gpuCount) {
  // Show only as many datasets as this machine has GPUs
  chart.data.datasets.forEach((ds, i) => { ds.hidden = i >= gpuCount; });
  for (let i = 0; i < gpuCount; i++) {
    chart.data.datasets[i].data = allData.map(d => {
      const gpus = _normalizeGpus(d.gpu);
      const g    = gpus[i];
      let   y    = (g && !g.error) ? g[valueKey] : null;
      if (valueKey === 'memory_used_mb') {
        // Convert MB → % of that GPU's total memory
        y = (g && !g.error && g.memory_total_mb > 0)
          ? (g.memory_used_mb / g.memory_total_mb * 100) : null;
      }
      return (y != null) ? { x: new Date(d.timestamp), y } : { x: new Date(d.timestamp), y: null };
    });
  }
  chart.update();
}

function mean(arr) {
  const valid = arr.filter(v => v != null && !isNaN(v));
  return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 0;
}

// ─── Bootstrap ───────────────────────────────────────────────────────────────
document.getElementById('machine-select').addEventListener('change', e => setMachine(e.target.value));
initCharts();
loadMachines().then(() => {
  refresh();
  setInterval(refresh, 10000);
});
</script>
</body>
</html>
